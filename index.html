l<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Children Duty Roster</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Barlow:wght@400;500;600;700&display=swap');

  :root {
    --green-dark: #114b11;
    --green-mid: #1e6b1e;
    --green-light: #a3ffa3;
    --green-pale: #d4f7d4;
    --yellow: #FFD700;
    --orange: #E67E22;
    --red-light: #ffe3e3;
    --blue-light: #cfe2ff;
    --white: #ffffff;
    --border: #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f1a;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Title Animation */
  h1 {
    font-family: 'Teko', sans-serif;
    color: var(--yellow);
    font-size: 2.5rem;
    letter-spacing: 4px;
    margin-bottom: 18px;
    text-shadow: 0 0 15px rgba(255,215,0,0.5);
    animation: fadeInDown 0.8s ease-out;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 22px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    animation: fadeIn 1s ease-out;
  }

  .controls label {
    color: #fff;
    font-weight: 700;
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .controls select, .controls input[type="date"] {
    background: #0d2b0d;
    color: var(--yellow);
    border: 2px solid var(--green-mid);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 1rem;
    font-weight: 600;
    font-family: 'Barlow', sans-serif;
    cursor: pointer;
    outline: none;
    transition: all 0.3s ease;
  }

  .controls select:focus, .controls input[type="date"]:focus {
    border-color: var(--yellow);
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
  }

  .controls button {
    background: var(--green-mid);
    color: #fff;
    border: 2px solid var(--yellow);
    border-radius: 6px;
    padding: 8px 20px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Barlow', sans-serif;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .controls button:hover { 
    background: var(--green-dark); 
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(30, 107, 30, 0.4);
  }

  .controls button:active { transform: translateY(1px); }

  .btn-download {
    background: #2980b9 !important;
    border-color: #3498db !important;
  }
  .btn-download:hover {
    background: #1f618d !important;
    box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4) !important;
  }

  /* ===== MAIN ROSTER CARD ===== */
  .roster-card {
    background: #f4faf4;
    border: 4px solid var(--green-dark);
    border-radius: 12px;
    overflow: hidden;
    width: 100%;
    max-width: 860px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    opacity: 0;
  }

  /* Card load animation selector (will be temporarily disabled on capture) */
  .roster-card.run-animation {
    animation: cardEntrance 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
  }

  .roster-body {
    display: flex;
    flex-direction: row;
  }

  @media (max-width: 768px) {
    .roster-body { flex-direction: column; }
    .left-section { border-right: none !important; border-bottom: 4px solid var(--green-dark); }
  }

  /* ===== LEFT SECTION ===== */
  .left-section {
    flex: 1.1;
    border-right: 4px solid var(--green-dark);
  }

  .section-header {
    background: var(--green-dark);
    color: var(--white);
    text-align: center;
    font-family: 'Teko', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    padding: 8px 0;
    font-weight: 600;
  }

  .children-table {
    width: 100%;
    border-collapse: collapse;
  }

  .children-table th {
    background: #a3dba3;
    color: #000;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 8px;
    border: 1px solid var(--border);
    text-align: center;
  }

  .children-table td {
    padding: 6px 10px;
    border: 1px solid #999;
    font-size: 0.95rem;
    color: #000;
    font-weight: 600;
    text-align: center;
  }

  /* Row Appear Base Animation */
  .run-animation .children-table tbody tr {
    animation: rowAppear 0.4s ease-out backwards;
  }

  .row-morning { background: var(--green-pale); }
  .row-both { background: #ffe0b2; }
  .row-evening { background: var(--red-light); }
  .row-zero { background: #e0e0e0; color: #666; }
  .row-total-label { background: var(--blue-light); font-weight: 700; }
  .row-grand { background: var(--yellow); font-weight: 700; }

  /* ===== RIGHT SECTION ===== */
  .right-section {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .offday-header {
    background: var(--yellow);
    color: #111;
    text-align: center;
    font-family: 'Teko', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    padding: 8px 0;
    font-weight: 600;
  }

  .right-table {
    width: 100%;
    border-collapse: collapse;
  }

  .right-table th {
    background: #a3dba3;
    color: #000;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 8px;
    border: 1px solid var(--border);
    text-align: center;
  }

  .right-table td {
    padding: 8px 12px;
    border: 1px solid #999;
    font-size: 0.95rem;
    color: #000;
    font-weight: 600;
  }

  .offday-row td { background: #fffde6; }
  .offday-names { color: #b30000; font-weight: 700; }

  .leave-header-row td {
    background: var(--green-mid);
    color: white;
    font-weight: 700;
    text-align: center;
    font-size: 1rem;
    letter-spacing: 1px;
    padding: 6px;
  }

  .leave-row { background: #fff9e6; }
  .leave-row td:first-child { font-weight: 700; color: #111; }

  .trail-header-row td {
    background: var(--orange);
    color: white;
    font-weight: 700;
    text-align: center;
    font-size: 1rem;
    letter-spacing: 1px;
    padding: 6px;
  }

  .trail-row { background: #f0f8ff; }
  .trail-row td { padding: 8px 12px; }

  .date-cell {
    background: var(--green-dark);
    color: var(--yellow);
    text-align: center;
    font-family: 'Teko', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 2px;
    padding: 12px;
    border-top: 4px solid var(--green-dark);
    margin-top: auto;
  }

  /* ===== MODAL & CHIPS ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .modal-overlay.open { display: flex; opacity: 1; }

  .modal {
    background: #0a220a;
    border: 2px solid var(--yellow);
    border-radius: 12px;
    padding: 24px;
    width: 95%;
    max-width: 540px;
    color: var(--white);
    max-height: 90vh;
    overflow-y: auto;
    transform: scale(0.7);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .modal-overlay.open .modal { transform: scale(1); }

  .modal h2 {
    font-family: 'Teko', sans-serif;
    color: var(--yellow);
    font-size: 1.8rem;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }

  .modal label {
    display: block;
    color: #fff;
    margin-top: 12px;
    margin-bottom: 4px;
    font-weight: 700;
    font-size: 0.95rem;
  }

  .modal input, .modal textarea, .modal select {
    width: 100%;
    background: #144414;
    color: #fff;
    border: 1px solid var(--yellow);
    border-radius: 5px;
    padding: 8px 12px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    outline: none;
  }

  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
  .btn-save { background: var(--green-mid); color: var(--yellow); border: 2px solid var(--yellow); border-radius: 6px; padding: 8px 24px; font-weight: 700; cursor: pointer; }
  .btn-cancel { background: #7c1a1a; color: #fff; border: 2px solid #ff4d4d; border-radius: 6px; padding: 8px 24px; font-weight: 700; cursor: pointer; }

  .name-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
    background: #0d2b0d;
    padding: 10px;
    border-radius: 6px;
  }

  .chip {
    background: #1b521b;
    border: 1px solid #555;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
    user-select: none;
    transition: all 0.2s ease;
  }
  
  .chip.selected { 
    background: var(--yellow); 
    border-color: var(--yellow); 
    color: #000; 
    font-weight: 700;
    transform: scale(1.05);
  }

  /* ===== ANIMATIONS KEYFRAMES ===== */
  @keyframes cardEntrance {
    from { opacity: 0; transform: translateY(30px) scale(0.99); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes rowAppear {
    from { opacity: 0; transform: translateX(-15px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<h1>📋 CHILDREN DUTY ROSTER</h1>

<div class="controls">
  <label>Day:</label>
  <select id="daySelect">
    <option value="Saturday">Saturday</option>
    <option value="Sunday">Sunday</option>
    <option value="Monday">Monday</option>
    <option value="Tuesday">Tuesday</option>
    <option value="Wednesday">Wednesday</option>
    <option value="Thursday">Thursday</option>
    <option value="Friday">Friday</option>
  </select>

  <label>Date:</label>
  <input type="date" id="dateInput">

  <button onclick="openEditModal()">✏️ Edit</button>
  <button class="btn-download" onclick="downloadRosterImage()">📥 Download Image</button>
</div>

<div class="roster-card" id="rosterCard">
  </div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>✏️ Edit Day Data</h2>

    <label>Select Day to Edit:</label>
    <select id="editDay">
      <option value="Saturday">Saturday</option>
      <option value="Sunday">Sunday</option>
      <option value="Monday">Monday</option>
      <option value="Tuesday">Tuesday</option>
      <option value="Wednesday">Wednesday</option>
      <option value="Thursday">Thursday</option>
      <option value="Friday">Friday</option>
    </select>

    <label>Morning Shift (select names):</label>
    <div class="name-chips" id="morningChips"></div>

    <label>Evening Shift (select names):</label>
    <div class="name-chips" id="eveningChips"></div>

    <label>Off Day Children (comma separated):</label>
    <input type="text" id="editOffday" placeholder="e.g. Yeasmin,Sumaya,Jiniya">

    <label>Leave Data (one per line: Name L18,E19 ...):</label>
    <textarea id="editLeave" placeholder="Arpita L18,E19,M22&#10;ratan L18,L20(bh)"></textarea>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">💾 Save</button>
    </div>
  </div>
</div>

<script>
const ALL_CHILDREN = [
  "Onti","Rida","Runu","Anika","Hasib","Saied","Suikraching",
  "Juie","Afrain","Nafisa","Ashik","Abrar","Mou","Arpita","Anila","Ratan","Alvee",
  "Yeasmin","Sumaya","Jiniya","Arifa","Ashiq"
];

let defaultData = {
  Saturday: { morning: ["Juie","Yeasmin","Rida","Anila","Sumaya","Afrain","Alvee"], evening: ["Runu","Mou","Onti","Jiniya","Nafisa","Arifa","Saied","Ashik","Suikraching"], offday: [], leave: {} },
  Sunday: { morning: ["Yeasmin","Onti","Nafisa","Saied","Anika","Ashik","Suikraching"], evening: ["Juie","Arifa","Afrain","Runu","Arpita","Jiniya","Sumaya","Alvee","Ratan"], offday: [], leave: {} },
  Monday: { morning: ["Mou","Juie","Sumaya","Runu","Ratan","Alvee","Afrain"], evening: ["Yeasmin","Jiniya","Suikraching","Onti","Ashik","Arpita","Hasib","Anika","Anila","Rida"], offday: [], leave: {} },
  Tuesday: { morning: ["Onti","Rida","Runu","Anika","Hasib","Saied","Suikraching"], evening: ["Juie","Afrain","Nafisa","Ashik","Mou","Arpita","Anila","Ratan","Alvee"], offday: ["Yeasmin","Sumaya","Jiniya"], leave: { "Arpita": "L18,E19,M22", "ratan": "L18,L20(bh)" } },
  Wednesday: { morning: ["Juie","Yeasmin","Hasib","Nafisa","Anila","Sumaya","Alvee"], evening: ["Mou","Saied","Arifa","Rida","Jiniya","Runu","Anika","Arpita","Suikraching","Ratan"], offday: [], leave: {} },
  Thursday: { morning: ["Mou","Hasib","Rida","Arpita","Yeasmin","Anika","Saied"], evening: ["Onti","Sumaya","Runu","Nafisa","Anila","Afrain","Jiniya","Arifa","Ashiq","Ratan"], offday: [], leave: {} },
  Friday: { morning: ["Onti","Mou","Afrain","Anila","Nafisa","Suikraching","Ratan"], evening: ["Sumaya","Jiniya","Saied","Juie","Arifa","Yeasmin","Arpita","Ashik","Rida","Hasib","Anika","Alvee"], offday: [], leave: {} }
};

let rosterData = JSON.parse(localStorage.getItem('rosterData')) || defaultData;

function formatDisplayDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  return d.toLocaleDateString('en-US', opts);
}

function render() {
  const card = document.getElementById('rosterCard');
  // Dynamic refresh animation container
  card.classList.remove('run-animation');

  const day = document.getElementById('daySelect').value;
  const dateVal = document.getElementById('dateInput').value;
  const data = rosterData[day];

  if (!data) return;

  const morningSet = new Set(data.morning);
  const eveningSet = new Set(data.evening);

  let morningRows = '';
  let bothRows = '';
  let eveningRows = '';

  let morningTotal = data.morning.length;
  let eveningTotal = data.evening.length;

  let index = 0;

  ALL_CHILDREN.forEach(name => {
    const isMorning = morningSet.has(name);
    const isEvening = eveningSet.has(name);
    let delay = (index * 0.03) + 's';

    if (isMorning && isEvening) {
      bothRows += `<tr class="row-both" style="animation-delay: ${delay}"><td>${name}</td><td>1</td><td>1</td></tr>`;
      index++;
    } else if (isMorning) {
      morningRows += `<tr class="row-morning" style="animation-delay: ${delay}"><td>${name}</td><td>1</td><td></td></tr>`;
      index++;
    } else if (isEvening) {
      eveningRows += `<tr class="row-evening" style="animation-delay: ${delay}"><td>${name}</td><td></td><td>1</td></tr>`;
      index++;
    }
  });

  let tableRows = morningRows + bothRows + eveningRows;

  let leaveRows = '';
  const leaveEntries = Object.entries(data.leave);
  if (leaveEntries.length === 0) {
    leaveRows = `<tr class="leave-row"><td colspan="2" style="text-align:center;color:#666;font-style:italic;">No leave data</td></tr>`;
  } else {
    leaveEntries.forEach(([name, info]) => {
      leaveRows += `<tr class="leave-row"><td>${name}</td><td>${info}</td></tr>`;
    });
  }

  const offdayNames = data.offday.length > 0 ? data.offday.join(', ') : '—';
  const dateDisplay = dateVal ? formatDisplayDate(dateVal) : day;

  card.innerHTML = `
    <div class="roster-body">
      <div class="left-section">
        <div class="section-header">CHILDREN</div>
        <table class="children-table">
          <thead>
            <tr><th>Name</th><th>Morning</th><th>Evening</th></tr>
          </thead>
          <tbody>
            ${tableRows}
            <tr class="row-zero" style="animation-delay: ${(index * 0.03) + 's'}"><td>0</td><td></td><td></td></tr>
            <tr class="row-total-label" style="animation-delay: ${((index + 1) * 0.03) + 's'}">
              <td>Total</td>
              <td>${morningTotal}</td>
              <td>${eveningTotal}</td>
            </tr>
            <tr class="row-grand" style="animation-delay: ${((index + 2) * 0.03) + 's'}">
              <td colspan="2" style="text-align:right;">TOTAL=</td>
              <td>${morningTotal + eveningTotal}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="right-section">
        <div class="offday-header">OFFDAY</div>
        <table class="right-table">
          <thead><tr><th>Dep</th><th>Name</th></tr></thead>
          <tbody>
            <tr class="offday-row"><td>CHILDREN</td><td class="offday-names">${offdayNames}</td></tr>
            <tr><td colspan="2" style="background:#f4faf4;height:6px;"></td></tr>
            <tr class="leave-header-row"><td colspan="2">Leave Data</td></tr>
            ${leaveRows}
            <tr><td colspan="2" style="background:#f4faf4;height:6px;"></td></tr>
            <tr class="trail-header-row"><td colspan="2">Trail</td></tr>
            <tr class="trail-row"><td>Morning</td><td></td></tr>
            <tr class="trail-row"><td>Evening</td><td></td></tr>
          </tbody>
        </table>
        <div class="date-cell" id="bottomDateCell">${dateDisplay}</div>
      </div>
    </div>
  `;

  // Trigger smooth rendering layout after nodes injection
  setTimeout(() => {
    card.classList.add('run-animation');
  }, 10);
}

// ===== ABSOLUTE BULLETPROOF DOWNLOAD BLOCK =====
function downloadRosterImage() {
  const rosterCard = document.getElementById('rosterCard');
  const selectedDay = document.getElementById('daySelect').value;
  const selectedDate = document.getElementById('dateInput').value || 'roster';

  // CRITICAL FIX: Microsecond animation suspension for flawless canvas frame capture
  rosterCard.classList.remove('run-animation');
  rosterCard.style.opacity = '1'; 

  html2canvas(rosterCard, {
    scale: 2, // Double quality configuration 
    backgroundColor: '#f4faf4',
    useCORS: true,
    logging: false
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = `Roster_${selectedDay}_${selectedDate}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();

    // Re-enable app interactive animations post download pipeline
    rosterCard.classList.add('run-animation');
  });
}

function openEditModal() {
  const day = document.getElementById('daySelect').value;
  document.getElementById('editDay').value = day;
  buildChips(day);
  const data = rosterData[day];
  document.getElementById('editOffday').value = data.offday.join(',');
  document.getElementById('editLeave').value = Object.entries(data.leave).map(([k,v])=>`${k} ${v}`).join('\n');
  
  const modalOverlay = document.getElementById('modalOverlay');
  modalOverlay.style.display = 'flex';
  setTimeout(() => {
    modalOverlay.classList.add('open');
  }, 10);
}

function closeEditModal() {
  const modalOverlay = document.getElementById('modalOverlay');
  modalOverlay.classList.remove('open');
  setTimeout(() => {
    modalOverlay.style.display = 'none';
  }, 300);
}

function buildChips(day) {
  const data = rosterData[day];
  const morningDiv = document.getElementById('morningChips');
  const eveningDiv = document.getElementById('eveningChips');

  morningDiv.innerHTML = '';
  eveningDiv.innerHTML = '';

  ALL_CHILDREN.forEach(name => {
    const mChip = document.createElement('span');
    mChip.className = 'chip' + (data.morning.includes(name) ? ' selected' : '');
    mChip.textContent = name;
    mChip.onclick = () => mChip.classList.toggle('selected');
    morningDiv.appendChild(mChip);

    const eChip = document.createElement('span');
    eChip.className = 'chip' + (data.evening.includes(name) ? ' selected' : '');
    eChip.textContent = name;
    eChip.onclick = () => eChip.classList.toggle('selected');
    eveningDiv.appendChild(eChip);
  });
}

function saveEdit() {
  const day = document.getElementById('editDay').value;

  const morning = [...document.querySelectorAll('#morningChips .chip.selected')].map(c => c.textContent);
  const evening = [...document.querySelectorAll('#eveningChips .chip.selected')].map(c => c.textContent);

  const offdayRaw = document.getElementById('editOffday').value;
  const offday = offdayRaw.split(',').map(s=>s.trim()).filter(Boolean);

  const leaveRaw = document.getElementById('editLeave').value;
  const leave = {};
  leaveRaw.split('\n').forEach(line => {
    const parts = line.trim().split(' ');
    if (parts.length >= 2) {
      const name = parts[0];
      const info = parts.slice(1).join(' ');
      leave[name] = info;
    }
  });

  rosterData[day] = { morning, evening, offday, leave };
  localStorage.setItem('rosterData', JSON.stringify(rosterData));

  document.getElementById('daySelect').value = day;
  closeEditModal();
  render();
}

function setBangladeshDateTime() {
  const bdTimeString = new Date().toLocaleString("en-US", { timeZone: "Asia/Dhaka" });
  const bdDate = new Date(bdTimeString);

  const year = bdDate.getFullYear();
  const month = String(bdDate.getMonth() + 1).padStart(2, '0');
  const day = String(bdDate.getDate()).padStart(2, '0');
  const formattedDate = `${year}-${month}-${day}`;

  const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  const dayName = daysOfWeek[bdDate.getDay()];

  document.getElementById('dateInput').value = formattedDate;
  document.getElementById('daySelect').value = dayName;
}

setBangladeshDateTime();

document.getElementById('dateInput').addEventListener('change', function() {
  if (this.value) {
    const d = new Date(this.value + 'T00:00:00');
    const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    document.getElementById('daySelect').value = daysOfWeek[d.getDay()];
  }
  render();
});

document.getElementById('daySelect').addEventListener('change', function() {
  const selectedDay = this.value;
  const currentDateVal = document.getElementById('dateInput').value;
  
  if (currentDateVal) {
    const currentD = new Date(currentDateVal + 'T00:00:00');
    const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    const currentDayIndex = currentD.getDay();
    const targetDayIndex = daysOfWeek.indexOf(selectedDay);
    
    let dayDiff = targetDayIndex - currentDayIndex;
    currentD.setDate(currentD.getDate() + dayDiff);
    
    const year = currentD.getFullYear();
    const month = String(currentD.getMonth() + 1).padStart(2, '0');
    const day = String(currentD.getDate()).padStart(2, '0');
    
    document.getElementById('dateInput').value = `${year}-${month}-${day}`;
  }
  render();
});

document.getElementById('editDay').addEventListener('change', function() {
  buildChips(this.value);
  const data = rosterData[this.value];
  document.getElementById('editOffday').value = data.offday.join(',');
  document.getElementById('editLeave').value = Object.entries(data.leave).map(([k,v])=>`${k} ${v}`).join('\n');
});

render();
</script>
</body>
